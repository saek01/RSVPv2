services:
  postgres:
    image: postgres:16-alpine
    container_name: rsvpv2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rsvp
      POSTGRES_PASSWORD: rsvp
      POSTGRES_DB: rsvp
    ports:
      - "5432:5432"
    volumes:
      - rsvpv2_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsvp -d rsvp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rsvpv2_pgdata:
